name: Build Exe

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # ボタンを押して手動で動かすための設定

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なライブラリとPyInstallerのインストール
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # もし他にも必要なライブラリがあれば、ここに「pip install ライブラリ名」を追加します

    - name: PyInstallerでexeファイルを作成
      run: |
        pyinstaller --onefile main.py

    - name: 作成したexeファイルを保存してダウンロードできるようにする
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/main.exe
